{% extends 'base.html' %}

{% block title %}Acesso ao Sistema - MartinsTec Telecom{% endblock %}

{% block extra_head %}
<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 73px - 58px);
        width: 100%;
        margin: -2.5rem -2rem; /* Anula o padding do container pai no base.html */
        padding: 2.5rem 2rem;
        background-color: #f1f5f9; /* Fundo cinza claro sólido corporativo (sem texturas) */
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--border);
        border-radius: 8px; /* Cantos um pouco mais retos e sóbrios, estilo corporativo profissional */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
        background: var(--bg-secondary);
        overflow: hidden;
    }

    .login-accent-bar {
        height: 4px;
        background: var(--primary); /* Linha azul marinho sólida no topo (padrão de sistemas enterprise) */
    }

    .login-content {
        padding: 2.5rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .login-header {
        text-align: center;
    }

    .login-header h1 {
        font-family: var(--font-title);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 400;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
    }

    .form-group label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-wrapper i, .input-wrapper svg {
        position: absolute;
        left: 1rem;
        color: var(--text-secondary);
        width: 18px;
        height: 18px;
        pointer-events: none;
        transition: color 0.2s ease;
        z-index: 10;
    }

    .input-control {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        background: #ffffff;
        border: 1px solid #cbd5e1; /* Borda visível e limpa padrão de sistemas modernos */
        border-radius: 6px;
        color: var(--text-primary);
        font-family: var(--font-family);
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }

    .input-control:focus {
        outline: none;
        border-color: var(--secondary);
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Efeito sutil no ícone ao focar */
    .input-control:focus ~ i,
    .input-control:focus ~ svg {
        color: var(--secondary);
    }

    .btn-submit {
        width: 100%;
        justify-content: center;
        padding: 0.75rem;
        font-size: 0.9rem;
        font-weight: 600;
        margin-top: 0.5rem;
        border-radius: 6px;
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: background 0.2s ease;
    }

    .btn-submit:hover {
        background: #172554; /* Azul mais escuro no hover */
    }

    .btn-submit:active {
        transform: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-accent-bar"></div>
        <div class="login-content">
            <div class="login-header">
                <h1>Portal de Engenharia</h1>
                <p>Identifique-se para acessar os sites de Telecom</p>
            </div>
            
            <form method="POST" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 1.25rem;">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuário Corporativo</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" id="username" class="input-control" placeholder="ex: joao.silva" required>
                        <i data-lucide="user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha de Rede</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" class="input-control" placeholder="••••••••" required>
                        <i data-lucide="lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit">
                    Entrar no Sistema
                    <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
